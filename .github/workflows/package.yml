name: build and publish rpm and deb packages

on:
  push:
    branches:
      - master
    
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_deb:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat << EOF > .env
          APP_NAME="grubdeck"
          VERSION="1.0.0"
          ARCHITECTURE="all"
          MAINTAINER="abino <abinopoulose@outlook.com>"
          DISPLAY_NAME="Grub Deck"
          ICON_SOURCE="./assets/grubdeck-logo.png"
          PROJECT_URL="https://github.com/abinopoulose/grubdeck"
          DEB_DESCRIPTION="A grub theme customizer for Debian-based systems."
          DEB_DEPENDENCIES="python3, python3-pyqt6, git"
          RPM_DESCRIPTION="A grub theme customizer for RPM-based systems."
          RPM_DEPENDENCIES="python3, python3-qt6, git"
          GRUBDECK_INDEX_URL="${{ vars.GRUBDECK_INDEX_URL }}"
          EOF

      - name: Make Script Executable
        run: chmod +x scripts/build-deb.sh

      - name: Build Debian Package
        run: ./scripts/build-deb.sh
        
      - name: Publish to 'deb' tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "deb"
          name: "Latest Debian Build"
          body: "Automatic build triggered by merge to master branch."
          overwrite: true
          files: |
            grubdeck.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build_rpm:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Generate .env file
        run: |
          cat << EOF > .env
          APP_NAME="grubdeck"
          VERSION="1.0.0"
          ARCHITECTURE="all"
          MAINTAINER="abino <abinopoulose@outlook.com>"
          DISPLAY_NAME="Grub Deck"
          ICON_SOURCE="./assets/grubdeck-logo.png"
          PROJECT_URL="https://github.com/abinopoulose/grubdeck"
          DEB_DESCRIPTION="A grub theme customizer for Debian-based systems."
          DEB_DEPENDENCIES="python3, python3-pyqt6, git"
          RPM_DESCRIPTION="A grub theme customizer for RPM-based systems."
          RPM_DEPENDENCIES="python3, python3-qt6, git"
          GRUBDECK_INDEX_URL="${{ vars.GRUBDECK_INDEX_URL }}"
          EOF

      - name: Make Script Executable
        run: chmod +x scripts/build-rpm.sh

      - name: Build RPM Package
        run: ./scripts/build-rpm.sh
          
      - name: Publish to 'rpm' tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "rpm"
          name: "Latest RPM Build"
          body: "Automatic build triggered by merge to master branch."
          overwrite: true
          files: |
            grubdeck.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}